server {
    listen 80;
    server_name staging-api.sagepoint.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging-api.sagepoint.online;

    ssl_certificate /etc/letsencrypt/live/staging-api.sagepoint.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-api.sagepoint.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Block common bot/scanner paths
    location ~* ^/(\.env|\.git|wp-admin|wp-login|webhook|fileupload|batch|bulk) {
        access_log off;
        return 444;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (document/roadmap processing events)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    client_max_body_size 50M;
}
