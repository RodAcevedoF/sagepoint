services:
  # ── Production ──
  api:
    image: ${IMAGE_PREFIX:-ghcr.io/rodacevedof/sagepoint}-api:${TAG:-latest}
    container_name: sagepoint_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file: .env.production
    environment:
      PORT: 3001
      REDIS_HOST: shared_redis
      NEO4J_URI: bolt://shared_neo4j:7687
    volumes:
      - ${GCP_KEY_PATH:-./gcp-key.json}:/app/gcp-key.json:ro
    networks:
      - shared

  worker:
    image: ${IMAGE_PREFIX:-ghcr.io/rodacevedof/sagepoint}-worker:${TAG:-latest}
    container_name: sagepoint_worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      REDIS_HOST: shared_redis
      NEO4J_URI: bolt://shared_neo4j:7687
    volumes:
      - ${GCP_KEY_PATH:-./gcp-key.json}:/app/gcp-key.json:ro
    networks:
      - shared

  # ── Staging ──
  api-staging:
    image: ${IMAGE_PREFIX:-ghcr.io/rodacevedof/sagepoint}-api:staging
    container_name: sagepoint_api_staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    env_file: .env.staging
    environment:
      PORT: 3002
      REDIS_HOST: shared_redis
      NEO4J_URI: bolt://shared_neo4j:7687
    volumes:
      - ${GCP_KEY_PATH:-./gcp-key.json}:/app/gcp-key.json:ro
    networks:
      - shared

  worker-staging:
    image: ${IMAGE_PREFIX:-ghcr.io/rodacevedof/sagepoint}-worker:staging
    container_name: sagepoint_worker_staging
    restart: unless-stopped
    env_file: .env.staging
    environment:
      REDIS_HOST: shared_redis
      NEO4J_URI: bolt://shared_neo4j:7687
    volumes:
      - ${GCP_KEY_PATH:-./gcp-key.json}:/app/gcp-key.json:ro
    networks:
      - shared

networks:
  shared:
    external: true
