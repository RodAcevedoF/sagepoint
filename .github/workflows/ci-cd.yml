name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, develop]
  release:
    types: [published]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/develop' }}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/sagepoint

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @sagepoint/database db:generate

      - run: pnpm build

      - run: pnpm check

      - run: pnpm test

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: user
          POSTGRES_DB: sagepoint
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5440:5432
        options: >-
          --health-cmd="pg_isready -U user -d sagepoint"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: none
        ports:
          - 7687:7687
        options: >-
          --health-cmd="cypher-shell -u neo4j -p neo4j 'RETURN 1' || true"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @sagepoint/database db:generate

      - run: pnpm build

      - name: Run migrations
        run: pnpm --filter @sagepoint/database migrate:up -- --author ci
        env:
          DATABASE_URL: postgresql://user@localhost:5440/sagepoint?schema=public

      - name: Create test database
        run: PGPASSWORD="" psql -h localhost -p 5440 -U user -d sagepoint -c "CREATE DATABASE sagepoint_test;"

      - name: Run migrations on test database
        run: pnpm --filter @sagepoint/database migrate:up -- --author ci
        env:
          DATABASE_URL: postgresql://user@localhost:5440/sagepoint_test?schema=public

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://user@localhost:5440/sagepoint_test?schema=public

      - name: Run E2E tests
        run: pnpm --filter @sagepoint/api test:e2e
        env:
          DATABASE_URL: postgresql://user@localhost:5440/sagepoint?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NEO4J_URI: bolt://localhost:7687
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

  build-and-push:
    needs: [quality, integration]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master') || github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [api, worker]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=staging-${{ github.sha }},enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.event_name == 'release' }}
            type=raw,value=prod-${{ github.sha }},enable=${{ github.ref == 'refs/heads/master' || github.event_name == 'release' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sync compose file to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: docker-compose.prod.yml
          target: /opt/sagepoint
          overwrite: true

      - name: Deploy staging to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd /opt/sagepoint
            docker compose -f docker-compose.prod.yml pull api-staging worker-staging
            docker compose -f docker-compose.prod.yml up -d api-staging worker-staging
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml exec -T api-staging node -e "process.exit(0)" 2>/dev/null && break
              sleep 2
            done
            docker compose -f docker-compose.prod.yml exec -T api-staging node scripts/migrate.js up --author ci
            docker image prune -f

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'release'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sync compose file to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: docker-compose.prod.yml
          target: /opt/sagepoint
          overwrite: true

      - name: Deploy production to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd /opt/sagepoint
            docker compose -f docker-compose.prod.yml pull api worker
            docker compose -f docker-compose.prod.yml up -d api worker
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml exec -T api node -e "process.exit(0)" 2>/dev/null && break
              sleep 2
            done
            docker compose -f docker-compose.prod.yml exec -T api node scripts/migrate.js up --author ci
            docker image prune -f
